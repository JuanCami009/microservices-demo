name: CI — Validación de rama

# Se ejecuta en ramas de trabajo y en PRs hacia las ramas permanentes.
# Según la estrategia Git Flow definida para el equipo de desarrollo:
#   - feature/**, hotfix/** → push directo activa CI
#   - Toda PR hacia develop o master debe pasar CI antes del merge
on:
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - develop
      - master

jobs:

  # ── vote (Java / Spring Boot) ──────────────────────────────────────────────
  test-vote:
    name: vote — compilar, testear y analizar (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: temurin
          cache: maven

      - name: Compilar
        run: mvn -f vote/pom.xml compile --no-transfer-progress

      - name: Tests unitarios
        run: mvn -f vote/pom.xml test --no-transfer-progress

      - name: Análisis estático (SpotBugs)
        run: mvn -f vote/pom.xml spotbugs:check --no-transfer-progress

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vote-surefire-reports
          path: vote/target/surefire-reports/
          retention-days: 7

  # ── worker (Go) ────────────────────────────────────────────────────────────
  test-worker:
    name: worker — compilar, testear y analizar (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod

      - name: Descargar dependencias
        working-directory: worker
        run: go mod download

      - name: Análisis estático (go vet)
        working-directory: worker
        run: go vet ./...

      - name: Compilar
        working-directory: worker
        run: go build -v ./...

      - name: Tests unitarios
        working-directory: worker
        run: go test -v -race ./...

  # ── result (Node.js) ───────────────────────────────────────────────────────
  build-result:
    name: result — instalar dependencias y auditar (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        working-directory: result
        run: npm install

      - name: Auditoría de seguridad de dependencias
        working-directory: result
        run: npm audit --audit-level=critical
