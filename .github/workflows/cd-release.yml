name: CD — Release Candidate (staging)

# Se ejecuta cuando se hace push a una rama release/** o hotfix/**.
# Publica imágenes con tag rc-<version> en ACR y despliega
# en la VM de staging via SSH con Docker Compose.
#
# Prerequisitos en la VM de staging: mismos que la VM de desarrollo.
#
# Secretos requeridos:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   AZURE_VM_HOST_STAGING  → IP o hostname de la VM de staging
#   AZURE_VM_USERNAME      → usuario SSH de la VM
#   AZURE_VM_SSH_KEY       → clave SSH privada
#
# Variables requeridas:
#   ACR_LOGIN_SERVER, ACR_NAME
on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'

env:
  IMAGE_PREFIX: ${{ vars.ACR_LOGIN_SERVER }}

jobs:

  # ── 1. Extraer versión del nombre de la rama ───────────────────────────────
  # release/SPRINT-02-v1.2.0  →  rc-1.2.0
  # hotfix/v1.2.1-worker-restart-clears-votes  →  rc-1.2.1
  extract-version:
    name: Extraer versión de la rama
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parsear versión
        id: parse
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION=$(echo "$BRANCH" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "No se encontró versión en la rama: $BRANCH"
            exit 1
          fi
          IMAGE_VERSION="rc-${VERSION#v}"
          echo "version=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Versión detectada: $IMAGE_VERSION"

  # ── 2. CI completo ─────────────────────────────────────────────────────────
  test-vote:
    name: vote — compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: temurin
          cache: maven
      - run: mvn -f vote/pom.xml test --no-transfer-progress
      - run: mvn -f vote/pom.xml spotbugs:check --no-transfer-progress

  test-worker:
    name: worker — compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
      - working-directory: worker
        run: go mod download
      - working-directory: worker
        run: go vet ./...
      - working-directory: worker
        run: go test -v -race ./...

  build-result:
    name: result — instalar y auditar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: result
        run: npm install
      - working-directory: result
        run: npm audit --audit-level=critical

  # ── 3. Construcción y publicación de imágenes RC en ACR ───────────────────
  build-and-push:
    name: Construir y publicar imágenes RC en ACR
    runs-on: ubuntu-latest
    needs: [extract-version, test-vote, test-worker, build-result]
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login en Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar — vote
        uses: docker/build-push-action@v6
        with:
          context: vote
          file: vote/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/vote:${{ needs.extract-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — worker
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/worker:${{ needs.extract-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — result
        uses: docker/build-push-action@v6
        with:
          context: result
          file: result/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/result:${{ needs.extract-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Despliegue en VM de staging via SSH ─────────────────────────────────
  deploy-staging:
    name: Desplegar en VM staging con Docker Compose
    runs-on: ubuntu-latest
    needs: [extract-version, build-and-push]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-compose.yml a la VM de staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST_STAGING }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/microservices-demo/

      - name: Desplegar con Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          VOTE_IMAGE: ${{ env.IMAGE_PREFIX }}/vote:${{ needs.extract-version.outputs.version }}
          WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}/worker:${{ needs.extract-version.outputs.version }}
          RESULT_IMAGE: ${{ env.IMAGE_PREFIX }}/result:${{ needs.extract-version.outputs.version }}
          ACR_NAME: ${{ vars.ACR_NAME }}
        with:
          host: ${{ secrets.AZURE_VM_HOST_STAGING }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: VOTE_IMAGE,WORKER_IMAGE,RESULT_IMAGE,ACR_NAME
          script: |
            cd /opt/microservices-demo
            az acr login --name "$ACR_NAME"
            printf "VOTE_IMAGE=%s\nWORKER_IMAGE=%s\nRESULT_IMAGE=%s\n" \
              "$VOTE_IMAGE" "$WORKER_IMAGE" "$RESULT_IMAGE" > .env
            docker compose pull
            docker compose up -d --remove-orphans
