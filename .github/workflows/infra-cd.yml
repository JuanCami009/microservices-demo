name: Infra CD — Aprovisionamiento de GCP

# Se ejecuta cuando se hace merge a main.
# En Trunk-based Development para operaciones, main es la fuente de verdad:
# lo que entra al trunk se despliega automáticamente.
#
# Este pipeline ejecuta el script scripts/provision-gcp.sh que crea o
# actualiza de forma idempotente los recursos de GCP necesarios:
#   - Google Artifact Registry (GAR) para almacenar imágenes Docker
#   - Service Account con rol artifactregistry.reader para las VMs
#   - Reglas de firewall para puertos 8080 y 4000
#   - VMs de Compute Engine con Docker, Docker Compose y gcloud instalados
#
# Secretos requeridos:
#   GCP_WORKLOAD_IDENTITY_PROVIDER → URI del proveedor Workload Identity
#   GCP_SERVICE_ACCOUNT            → email de la SA para GitHub Actions
#
# Variables requeridas:
#   GCP_PROJECT_ID  → ID del proyecto de GCP (ej. my-project-123)
#   GAR_LOCATION    → región del Artifact Registry (ej. us-central1)
#   GAR_REPO        → nombre del repositorio en GAR (ej. microservices)
#   GCE_ZONE        → zona de las VMs (ej. us-central1-a)
on:
  push:
    branches:
      - main

jobs:

  provision:
    name: Aprovisionar recursos de GCP
    runs-on: ubuntu-latest
    environment: infrastructure   # Aprobación manual recomendada
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Aprovisionar infraestructura de GCP
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GAR_LOCATION: ${{ vars.GAR_LOCATION }}
          GAR_REPO: ${{ vars.GAR_REPO }}
          GCE_ZONE: ${{ vars.GCE_ZONE }}
        run: |
          chmod +x scripts/provision-gcp.sh
          bash scripts/provision-gcp.sh

      - name: Mostrar resumen de recursos creados
        if: always()
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GAR_LOCATION: ${{ vars.GAR_LOCATION }}
          GCE_ZONE: ${{ vars.GCE_ZONE }}
        run: |
          echo "### VMs del proyecto $GCP_PROJECT_ID"
          gcloud compute instances list \
            --project="$GCP_PROJECT_ID" \
            --filter="tags.items=microservices-demo" \
            --format="table(name,zone,status,networkInterfaces[0].accessConfigs[0].natIP)"
          echo ""
          echo "### Repositorios de Artifact Registry"
          gcloud artifacts repositories list \
            --project="$GCP_PROJECT_ID" \
            --location="$GAR_LOCATION" \
            --format="table(name,format,location)"
