name: CD — Producción

# Se ejecuta cuando se hace push de un tag vX.Y.Z a master.
# En Git Flow, este tag se crea al mergear la rama release/** a master:
#
#   git checkout master
#   git merge --no-ff release/SPRINT-02-v1.2.0
#   git tag -a v1.2.0 -m "Release v1.2.0 — Sprint 02"
#   git push origin master --tags
#
# Publica imágenes con tag de versión definitivo en Google Artifact Registry
# y despliega en la VM de producción via SSH con Docker Compose.
# El job deploy-production requiere aprobación manual (GitHub Environments).
#
# Prerequisitos en la VM de producción: mismos que las otras VMs.
#
# Secretos requeridos:
#   GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   GCP_VM_HOST_PROD   → IP externa de la VM de producción
#   GCP_VM_USERNAME    → usuario SSH de la VM
#   GCP_VM_SSH_KEY     → clave SSH privada
#
# Variables requeridas:
#   GCP_PROJECT_ID, GAR_LOCATION, GAR_REPO
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  IMAGE_PREFIX: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}

jobs:

  # ── 1. Construcción y publicación de imágenes de producción en GAR ──────────
  build-and-push:
    name: Construir y publicar imágenes de producción en GAR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extraer versión del tag
        id: version
        run: |
          IMAGE_VERSION="${GITHUB_REF_NAME#v}"
          echo "image_version=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Versión de producción: $IMAGE_VERSION"

      - name: Autenticar en GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar — vote
        uses: docker/build-push-action@v6
        with:
          context: vote
          file: vote/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vote:${{ steps.version.outputs.image_version }}
            ${{ env.IMAGE_PREFIX }}/vote:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — worker
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worker:${{ steps.version.outputs.image_version }}
            ${{ env.IMAGE_PREFIX }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — result
        uses: docker/build-push-action@v6
        with:
          context: result
          file: result/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/result:${{ steps.version.outputs.image_version }}
            ${{ env.IMAGE_PREFIX }}/result:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Despliegue en VM de producción via SSH ──────────────────────────────
  deploy-production:
    name: Desplegar en VM prod con Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # Requiere aprobación manual en GitHub Environments
    permissions:
      id-token: write
      contents: write   # Para crear el GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Extraer versión del tag
        id: version
        run: echo "image_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Copiar docker-compose.yml a la VM de producción
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST_PROD }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/microservices-demo/

      - name: Desplegar con Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          VOTE_IMAGE: ${{ env.IMAGE_PREFIX }}/vote:${{ steps.version.outputs.image_version }}
          WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}/worker:${{ steps.version.outputs.image_version }}
          RESULT_IMAGE: ${{ env.IMAGE_PREFIX }}/result:${{ steps.version.outputs.image_version }}
          GAR_LOCATION: ${{ vars.GAR_LOCATION }}
        with:
          host: ${{ secrets.GCP_VM_HOST_PROD }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          envs: VOTE_IMAGE,WORKER_IMAGE,RESULT_IMAGE,GAR_LOCATION
          script: |
            cd /opt/microservices-demo
            gcloud auth configure-docker "$GAR_LOCATION-docker.pkg.dev" --quiet
            printf "VOTE_IMAGE=%s\nWORKER_IMAGE=%s\nRESULT_IMAGE=%s\n" \
              "$VOTE_IMAGE" "$WORKER_IMAGE" "$RESULT_IMAGE" > .env
            docker compose pull
            docker compose up -d --remove-orphans

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Imágenes desplegadas en producción
            - `vote`: `${{ env.IMAGE_PREFIX }}/vote:${{ steps.version.outputs.image_version }}`
            - `worker`: `${{ env.IMAGE_PREFIX }}/worker:${{ steps.version.outputs.image_version }}`
            - `result`: `${{ env.IMAGE_PREFIX }}/result:${{ steps.version.outputs.image_version }}`
          generate_release_notes: true
