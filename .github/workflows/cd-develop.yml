name: CD — Ambiente de desarrollo

# Se ejecuta cuando se hace merge a develop (cierre de PR de feature).
# Construye las imágenes Docker, las publica en Google Artifact Registry
# con los tags dev-latest y dev-<sha>, luego despliega en la VM de
# desarrollo via SSH ejecutando Docker Compose.
#
# Prerequisitos en la VM de GCP:
#   - Docker y Docker Compose instalados (via startup-script al crear la VM)
#   - gcloud CLI instalado
#   - Service Account con roles/artifactregistry.reader adjunto a la VM
#   - El directorio /opt/microservices-demo debe existir
#
# Secretos requeridos:
#   GCP_WORKLOAD_IDENTITY_PROVIDER → URI del proveedor Workload Identity
#   GCP_SERVICE_ACCOUNT            → email de la SA para GitHub Actions
#   GCP_VM_HOST_DEV    → IP externa de la VM de desarrollo
#   GCP_VM_USERNAME    → usuario SSH de la VM (ej. ubuntu)
#   GCP_VM_SSH_KEY     → clave SSH privada para acceder a la VM
#
# Variables requeridas:
#   GCP_PROJECT_ID     → ID del proyecto de GCP (ej. my-project-123)
#   GAR_LOCATION       → región del Artifact Registry (ej. us-central1)
#   GAR_REPO           → nombre del repositorio en GAR (ej. microservices)
on:
  push:
    branches:
      - develop

env:
  IMAGE_PREFIX: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}

jobs:

  # ── 1. CI completo antes de construir imágenes ─────────────────────────────
  test-vote:
    name: vote — compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: temurin
          cache: maven
      - run: mvn -f vote/pom.xml test --no-transfer-progress
      - run: mvn -f vote/pom.xml spotbugs:check --no-transfer-progress

  test-worker:
    name: worker — compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
      - working-directory: worker
        run: go mod download
      - working-directory: worker
        run: go vet ./...
      - working-directory: worker
        run: go test -v -race ./...

  build-result:
    name: result — instalar y auditar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: result
        run: npm install
      - working-directory: result
        run: npm audit --audit-level=critical

  # ── 2. Construcción y publicación de imágenes en Artifact Registry ──────────
  build-and-push:
    name: Construir y publicar imágenes en GAR
    runs-on: ubuntu-latest
    needs: [test-vote, test-worker, build-result]
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar — vote
        uses: docker/build-push-action@v6
        with:
          context: vote
          file: vote/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vote:dev-latest
            ${{ env.IMAGE_PREFIX }}/vote:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — worker
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worker:dev-latest
            ${{ env.IMAGE_PREFIX }}/worker:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — result
        uses: docker/build-push-action@v6
        with:
          context: result
          file: result/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/result:dev-latest
            ${{ env.IMAGE_PREFIX }}/result:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Despliegue en VM de desarrollo via SSH ──────────────────────────────
  deploy-dev:
    name: Desplegar en VM dev con Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-compose.yml a la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST_DEV }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/microservices-demo/

      - name: Desplegar con Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          VOTE_IMAGE: ${{ env.IMAGE_PREFIX }}/vote:dev-${{ github.sha }}
          WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}/worker:dev-${{ github.sha }}
          RESULT_IMAGE: ${{ env.IMAGE_PREFIX }}/result:dev-${{ github.sha }}
          GAR_LOCATION: ${{ vars.GAR_LOCATION }}
        with:
          host: ${{ secrets.GCP_VM_HOST_DEV }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          envs: VOTE_IMAGE,WORKER_IMAGE,RESULT_IMAGE,GAR_LOCATION
          script: |
            cd /opt/microservices-demo

            # Autenticar Docker con Artifact Registry usando la SA adjunta a la VM
            gcloud auth configure-docker "$GAR_LOCATION-docker.pkg.dev" --quiet

            # Escribir el archivo .env con los tags de imagen del deploy actual
            printf "VOTE_IMAGE=%s\nWORKER_IMAGE=%s\nRESULT_IMAGE=%s\n" \
              "$VOTE_IMAGE" "$WORKER_IMAGE" "$RESULT_IMAGE" > .env

            # Actualizar imágenes y recrear contenedores con cambios
            docker compose pull
            docker compose up -d --remove-orphans
