name: CD — Ambiente de desarrollo

# Se ejecuta cuando se hace merge a develop (cierre de PR de feature).
# Construye las imágenes Docker, las publica en Azure Container Registry
# con el tag dev-<sha>, luego despliega en la VM de desarrollo via SSH
# ejecutando Docker Compose.
#
# Prerequisitos en la VM de Azure:
#   - Docker y Docker Compose instalados
#   - Azure CLI instalado
#   - Identidad administrada (Managed Identity) con rol AcrPull sobre el ACR
#   - El directorio /opt/microservices-demo debe existir
#
# Secretos requeridos:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  → OIDC para ACR push
#   AZURE_VM_HOST_DEV      → IP o hostname de la VM de desarrollo
#   AZURE_VM_USERNAME      → usuario SSH de la VM (ej. azureuser)
#   AZURE_VM_SSH_KEY       → clave SSH privada para acceder a la VM
#
# Variables requeridas:
#   ACR_LOGIN_SERVER       → ej. microdemo.azurecr.io
#   ACR_NAME               → ej. microdemo
on:
  push:
    branches:
      - develop

env:
  IMAGE_PREFIX: ${{ vars.ACR_LOGIN_SERVER }}

jobs:

  # ── 1. CI completo antes de construir imágenes ─────────────────────────────
  test-vote:
    name: vote — compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: temurin
          cache: maven
      - run: mvn -f vote/pom.xml test --no-transfer-progress
      - run: mvn -f vote/pom.xml spotbugs:check --no-transfer-progress

  test-worker:
    name: worker — compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
      - working-directory: worker
        run: go mod download
      - working-directory: worker
        run: go vet ./...
      - working-directory: worker
        run: go test -v -race ./...

  build-result:
    name: result — instalar y auditar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: result
        run: npm install
      - working-directory: result
        run: npm audit --audit-level=critical

  # ── 2. Construcción y publicación de imágenes en ACR ──────────────────────
  build-and-push:
    name: Construir y publicar imágenes en ACR
    runs-on: ubuntu-latest
    needs: [test-vote, test-worker, build-result]
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login en Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar — vote
        uses: docker/build-push-action@v6
        with:
          context: vote
          file: vote/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/vote:dev-latest
            ${{ env.IMAGE_PREFIX }}/vote:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — worker
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worker:dev-latest
            ${{ env.IMAGE_PREFIX }}/worker:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar — result
        uses: docker/build-push-action@v6
        with:
          context: result
          file: result/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/result:dev-latest
            ${{ env.IMAGE_PREFIX }}/result:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Despliegue en VM de desarrollo via SSH ──────────────────────────────
  deploy-dev:
    name: Desplegar en VM dev con Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-compose.yml a la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST_DEV }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/microservices-demo/

      - name: Desplegar con Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          VOTE_IMAGE: ${{ env.IMAGE_PREFIX }}/vote:dev-${{ github.sha }}
          WORKER_IMAGE: ${{ env.IMAGE_PREFIX }}/worker:dev-${{ github.sha }}
          RESULT_IMAGE: ${{ env.IMAGE_PREFIX }}/result:dev-${{ github.sha }}
          ACR_NAME: ${{ vars.ACR_NAME }}
        with:
          host: ${{ secrets.AZURE_VM_HOST_DEV }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: VOTE_IMAGE,WORKER_IMAGE,RESULT_IMAGE,ACR_NAME
          script: |
            cd /opt/microservices-demo

            # Autenticar Docker con ACR usando la Managed Identity de la VM
            az acr login --name "$ACR_NAME"

            # Escribir el archivo .env con los tags de imagen del deploy actual
            printf "VOTE_IMAGE=%s\nWORKER_IMAGE=%s\nRESULT_IMAGE=%s\n" \
              "$VOTE_IMAGE" "$WORKER_IMAGE" "$RESULT_IMAGE" > .env

            # Actualizar imágenes y recrear contenedores con cambios
            docker compose pull
            docker compose up -d --remove-orphans
