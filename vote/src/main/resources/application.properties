# ── Patrón Retry — instancia kafkaPublish ─────────────────────────────────────
# Reintenta hasta 3 veces con 500ms entre intentos.
# Solo reintenta KafkaException (timeouts de red, reconexiones de broker).
# SerializationException se ignora: un mensaje malformado no se resuelve
# reintentando; indica un bug en el código, no un fallo transitorio.
resilience4j.retry.instances.kafkaPublish.max-attempts=3
resilience4j.retry.instances.kafkaPublish.wait-duration=500ms
resilience4j.retry.instances.kafkaPublish.retry-exceptions=org.apache.kafka.common.KafkaException
resilience4j.retry.instances.kafkaPublish.ignore-exceptions=org.apache.kafka.common.errors.SerializationException

# ── Patrón Circuit Breaker — instancia kafkaPublish ───────────────────────────
# Ventana de 10 llamadas (basada en conteo).
# El circuito se ABRE si el 50% o más de las últimas 10 llamadas fallan,
# con un mínimo de 5 llamadas para tomar la decisión.
# Permanece abierto 30s antes de pasar a HALF-OPEN.
# En half-open: permite 2 llamadas de prueba; si pasan, el circuito se CIERRA.
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublish.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaPublish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublish.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.kafkaPublish.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaPublish.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.kafkaPublish.automatic-transition-from-open-to-half-open-enabled=true
